name: Deploy

# main  -> production (storenext-wc2026.web.app)
# dev   -> a Firebase Hosting PREVIEW CHANNEL (separate temporary URL), prod untouched
# Auth: the FIREBASE_REFRESH_TOKEN secret (firebase login:ci token) is read
# automatically by firebase-tools via the FIREBASE_TOKEN env var.
on:
  push:
    branches: [main, dev]

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run build
      - name: Deploy
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_REFRESH_TOKEN }}
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            npx -y firebase-tools deploy --only hosting --project world-cup-2026-c145b --non-interactive
          else
            npx -y firebase-tools hosting:channel:deploy dev --project world-cup-2026-c145b --expires 30d --non-interactive
          fi
