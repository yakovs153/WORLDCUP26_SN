name: Playground sync

# Mirrors a currently-live competition into the playgroundSnapshot doc so
# /playground stays fresh. Auto-runs LIVE every 15 minutes; can also be
# triggered manually with a specific competition or SIM mode.
on:
  schedule:
    - cron: '*/15 * * * *' # auto-refresh LIVE (ESPN multi-sport) every 15 min
  workflow_dispatch:
    inputs:
      comp:
        description: 'SIM = fake live match · LIVE = real games via ESPN (any sport) · or a football-data code (CL/PL/BSA…)'
        required: false
        default: 'LIVE'
      live_minutes:
        description: 'Keep polling every 60s for N minutes (0 = run once)'
        required: false
        default: '0'

concurrency:
  group: playground-sync
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    env:
      GOOGLE_CLOUD_PROJECT: world-cup-2026-c145b
      GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/adc.json
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install firebase-admin@^12 --no-save
      - name: Write credentials from refresh token
        env:
          RT: ${{ secrets.FIREBASE_REFRESH_TOKEN }}
        run: |
          printf '{"type":"authorized_user","client_id":"563584335869-fgrhgmd47bqnekij5i8b5pr03ho849e6.apps.googleusercontent.com","client_secret":"j9iVZfS8kkCEFUPaAeJV0sAi","refresh_token":"%s"}' "$RT" > "$GOOGLE_APPLICATION_CREDENTIALS"
      - name: Run playground (SIM = fake live match; else mirror a real competition)
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          COMP: ${{ github.event.inputs.comp || 'LIVE' }}
          LIVE_MINUTES: ${{ github.event.inputs.live_minutes || '0' }}
          SIM_MINUTES: ${{ github.event.inputs.live_minutes || '5' }}
        run: |
          if [ "$COMP" = "SIM" ]; then
            node scripts/playground-sim.mjs
          elif [ "$COMP" = "LIVE" ]; then
            END=$(( SECONDS + 60 * LIVE_MINUTES ))
            while : ; do
              node scripts/playground-livetest.mjs || true
              if [ "$SECONDS" -ge "$END" ]; then break; fi
              sleep 60
            done
          else
            END=$(( SECONDS + 60 * LIVE_MINUTES ))
            while : ; do
              node scripts/playground-sync.mjs || true
              if [ "$SECONDS" -ge "$END" ]; then break; fi
              sleep 60
            done
          fi
      - name: Clean up credentials
        if: always()
        run: rm -f "$GOOGLE_APPLICATION_CREDENTIALS"
