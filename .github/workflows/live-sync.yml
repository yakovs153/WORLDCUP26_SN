name: Live results sync

# Polls football-data.org and writes fixtures + live scores to Firestore,
# scoring finished matches. Auth: a Firebase CLI refresh token (no service
# account / no IT) stored in the FIREBASE_REFRESH_TOKEN secret.
#
# Two modes:
#   • schedule (every 5 min) — heartbeat: fixtures, kickoffs, results.
#   • workflow_dispatch with `live_minutes` > 0 — near-real-time: one job that
#     re-syncs every 60s for that many minutes (run it during a match window).
on:
  schedule:
    - cron: '*/5 * * * *' # every 5 minutes (GitHub's scheduled minimum)
  workflow_dispatch:
    inputs:
      live_minutes:
        description: 'Live mode: keep polling every 60s for N minutes (0 = run once)'
        required: false
        default: '0'

concurrency:
  group: live-sync
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    env:
      GOOGLE_CLOUD_PROJECT: world-cup-2026-c145b
      GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/adc.json
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install firebase-admin@^12 --no-save
      - name: Write credentials from refresh token
        env:
          RT: ${{ secrets.FIREBASE_REFRESH_TOKEN }}
        run: |
          printf '{"type":"authorized_user","client_id":"563584335869-fgrhgmd47bqnekij5i8b5pr03ho849e6.apps.googleusercontent.com","client_secret":"j9iVZfS8kkCEFUPaAeJV0sAi","refresh_token":"%s"}' "$RT" > "$GOOGLE_APPLICATION_CREDENTIALS"
      - name: Run sync (loops in live mode)
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          LIVE_MINUTES: ${{ github.event.inputs.live_minutes || '0' }}
        run: |
          END=$(( SECONDS + 60 * LIVE_MINUTES ))
          while : ; do
            node scripts/sync-live.mjs || true
            if [ "$SECONDS" -ge "$END" ]; then break; fi
            sleep 60
          done
      - name: Clean up credentials
        if: always()
        run: rm -f "$GOOGLE_APPLICATION_CREDENTIALS"
