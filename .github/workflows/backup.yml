name: Daily predictions backup

# Exports all predictions to CSV and stores it as a private workflow artifact
# (90-day retention). Same keyless auth as the live sync. Manual runs allowed.
on:
  schedule:
    - cron: '17 3 * * *' # daily at 03:17 UTC
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GOOGLE_CLOUD_PROJECT: world-cup-2026-c145b
      GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/adc.json
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install firebase-admin@^12 --no-save
      - name: Write credentials from refresh token
        env:
          RT: ${{ secrets.FIREBASE_REFRESH_TOKEN }}
        run: |
          printf '{"type":"authorized_user","client_id":"563584335869-fgrhgmd47bqnekij5i8b5pr03ho849e6.apps.googleusercontent.com","client_secret":"j9iVZfS8kkCEFUPaAeJV0sAi","refresh_token":"%s"}' "$RT" > "$GOOGLE_APPLICATION_CREDENTIALS"
      - name: Export predictions
        run: node scripts/export-predictions.mjs
      - name: Clean up credentials
        if: always()
        run: rm -f "$GOOGLE_APPLICATION_CREDENTIALS"
      - uses: actions/upload-artifact@v4
        with:
          name: predictions-backup-${{ github.run_number }}
          path: |
            predictions-backup.csv
            bonus-predictions-backup.csv
          retention-days: 90
